name: Release

# dist/ 에 올린 실행 파일을 GitHub Release 자산으로 업로드합니다.
# 사용법: dist/ 에 exe 를 커밋한 뒤 버전 태그를 푸시하면 됩니다.
#   git tag v2026.02.16
#   git push origin v2026.02.16

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v2026.02.16)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release and upload dist assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: KeyPing ${{ github.event.inputs.tag || github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true
